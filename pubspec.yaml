name: rumour
description: Anonymous room-based chat powered by Firebase Firestore.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.8.1
  cloud_firestore: ^5.6.0
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7
  http: ^1.2.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.3
  uuid: ^4.5.1
  intl: ^0.20.2
  get_it: ^8.0.3
  go_router: ^14.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"

flutter_native_splash:
  color: "#000000"
  color_dark: "#000000"
  image: "assets/logo.png"
  image_dark: "assets/logo.png"
  android: true
  ios: true
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
